<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #F5F0EB; --card: #FEFCFA; --surface: #EDE7DF;
    --accent: #B8A99A; --accent-soft: #D4C8BC; --accent-deep: #8E7E6D;
    --sage: #A3B0A0; --sage-soft: #D9E2D6; --sage-dark: #7A9477;
    --rose: #C9A9A6; --rose-soft: #ECD9D7;
    --lavender: #ADA5B5; --lavender-soft: #DDD8E2; --lavender-dark: #8A7F94;
    --sky: #9FABB5; --sky-soft: #D3DBE0;
    --text: #4A4039; --text-sec: #9B8E82; --text-light: #C4B8AC;
    --border: #E8E0D8; --shadow: rgba(74,64,57,0.06);
  }
  body { font-family: 'Quicksand', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); }
  .app { max-width: 460px; margin: 0 auto; min-height: 100vh; padding-bottom: 90px; position: relative; }
  .view { display: none; } .view.active { display: block; }

  /* Header */
  .header { padding: 28px 24px 20px; background: linear-gradient(180deg, var(--card) 0%, var(--bg) 100%); }
  .header-row { display: flex; justify-content: space-between; align-items: flex-start; }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
  .header .sub { font-size: 13px; color: var(--text-sec); margin-top: 4px; }
  .stats { margin-top: 16px; display: flex; gap: 10px; }
  .stat-card { flex: 1; border-radius: 14px; padding: 12px 16px; text-align: center; }
  .stat-card .label { font-size: 11px; font-weight: 600; }
  .stat-card .value { font-size: 18px; font-weight: 700; margin-top: 2px; }

  /* Nav bar header */
  .nav-header { padding: 20px 24px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .nav-header h2 { font-size: 18px; font-weight: 700; }
  .back-btn { background: none; border: none; font-size: 18px; cursor: pointer; padding: 0; color: var(--accent-deep); font-family: inherit; }

  /* Buttons */
  .btn-surface { background: var(--surface); border: none; border-radius: 10px; padding: 8px 14px; font-size: 12px; font-weight: 600; color: var(--accent-deep); cursor: pointer; font-family: inherit; }
  .btn-primary { width: 100%; padding: 15px 0; background: var(--accent); color: var(--card); border: none; border-radius: 16px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.2s; letter-spacing: 0.3px; }
  .btn-primary:disabled { background: var(--surface); color: var(--text-light); }
  .btn-delete { background: var(--rose-soft); color: var(--rose); border: none; border-radius: 12px; padding: 10px 18px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .btn-delete-sm { background: var(--rose-soft); color: var(--rose); border: none; border-radius: 8px; padding: 5px 12px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit; }

  /* Cards */
  .card { background: var(--card); border-radius: 18px; box-shadow: 0 1px 8px var(--shadow); border: 1px solid var(--border); }
  .recipe-card { padding: 16px 18px; margin-bottom: 10px; cursor: pointer; transition: transform 0.15s; }
  .recipe-card:active { transform: scale(0.98); }
  .recipe-name { font-size: 15px; font-weight: 700; }
  .recipe-date { font-size: 11px; color: var(--text-light); }
  .recipe-top { display: flex; justify-content: space-between; align-items: center; }
  .tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
  .tag { border-radius: 8px; padding: 3px 10px; font-size: 11px; font-weight: 600; }
  .recipe-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
  .cost-big { font-size: 18px; font-weight: 700; color: var(--accent-deep); }
  .badge-row { display: flex; gap: 8px; align-items: center; }
  .badge { border-radius: 8px; padding: 3px 10px; font-size: 11px; font-weight: 700; }
  .badge-sage { background: var(--sage-soft); color: var(--sage-dark); }
  .badge-lav { background: var(--lavender-soft); color: var(--lavender-dark); }

  /* Stars */
  .stars { display: flex; gap: 3px; }
  .star { font-size: 18px; cursor: pointer; transition: color 0.15s; }
  .star-on { color: var(--rose); }
  .star-off { color: var(--border); }
  .star-sm { font-size: 12px; color: var(--rose); letter-spacing: 1px; }

  /* FAB */
  .fab { position: fixed; bottom: 28px; width: 52px; height: 52px; border-radius: 16px; background: var(--accent); color: var(--card); border: none; font-size: 24px; box-shadow: 0 4px 20px rgba(142,126,109,0.3); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; font-family: inherit; }

  /* Empty state */
  .empty { text-align: center; padding: 60px 24px; color: var(--text-light); }
  .empty-icon { font-size: 52px; margin-bottom: 16px; filter: grayscale(30%); }

  /* Input */
  .input { width: 100%; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: 14px; font-size: 15px; font-family: inherit; outline: none; background: var(--card); color: var(--text); transition: border-color 0.2s; }
  .input:focus { border-color: var(--accent); }
  .input-sm { padding: 10px 14px; font-size: 13px; border-radius: 10px; }
  textarea.input { min-height: 50px; resize: vertical; font-size: 13px; }
  select.input { font-size: 12px; padding: 10px; border-radius: 10px; }

  /* Portion buttons */
  .portion-btn { padding: 7px 14px; border: none; border-radius: 10px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .portion-btn.off { background: var(--surface); color: var(--accent-deep); }
  .portion-btn.on { background: var(--accent); color: var(--card); }

  /* Ingredient chips */
  .ing-chip { display: inline-flex; align-items: center; gap: 6px; padding: 9px 14px; background: var(--card); border: 1.5px solid var(--border); border-radius: 12px; font-size: 13px; cursor: pointer; font-family: inherit; color: var(--text); font-weight: 500; transition: all 0.15s; }
  .ing-chip.sel { background: var(--surface); border-color: transparent; color: var(--text-light); opacity: 0.5; cursor: default; }

  /* Detail sections */
  .detail-cost { margin: 16px; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
  .detail-cost .label { font-size: 11px; color: var(--text-sec); font-weight: 600; letter-spacing: 0.5px; }
  .detail-cost .big { font-size: 28px; font-weight: 700; margin-top: 2px; }
  .counter-card { margin: 12px 16px 0; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
  .counter-card .count { font-size: 24px; font-weight: 700; color: var(--lavender-dark); margin-top: 2px; }
  .counter-card .saved-note { font-size: 11px; color: var(--sage-dark); font-weight: 600; margin-top: 4px; }
  .counter-btns { display: flex; align-items: center; gap: 8px; }
  .btn-dec { width: 36px; height: 36px; border-radius: 12px; background: var(--surface); border: none; font-size: 18px; color: var(--accent-deep); cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: inherit; }
  .btn-inc { width: 48px; height: 48px; border-radius: 14px; background: var(--accent); border: none; font-size: 20px; color: var(--card); cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: inherit; box-shadow: 0 2px 12px rgba(142,126,109,0.3); }
  .ing-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; }
  .ing-row + .ing-row { border-top: 1px solid var(--border); }
  .ing-info { display: flex; align-items: center; gap: 10px; }
  .ing-emoji { font-size: 20px; }
  .ing-name { font-size: 14px; font-weight: 600; }
  .ing-portion { font-size: 11px; color: var(--text-light); }
  .ing-cost { font-size: 14px; font-weight: 700; color: var(--accent); }

  /* Category label */
  .cat-label { padding: 14px 20px 6px; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }

  /* Ingredient library item */
  .lib-item { margin: 0 16px 8px; padding: 12px 16px; border-radius: 14px; display: flex; justify-content: space-between; align-items: center; }
  .lib-info { display: flex; align-items: center; gap: 10px; }
  .lib-name { font-size: 13px; font-weight: 600; }
  .lib-detail { font-size: 11px; color: var(--text-light); }

  /* Add ingredient form */
  .add-form { margin: 12px 16px; padding: 18px; }
  .add-form .title { font-size: 13px; font-weight: 700; margin-bottom: 14px; }
  .form-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .btn-dashed { background: var(--surface); border: 1.5px dashed var(--accent-soft); border-radius: 14px; padding: 12px 18px; font-size: 13px; font-weight: 600; color: var(--accent); cursor: pointer; font-family: inherit; width: 100%; }
  .btn-add-confirm { flex: 1; padding: 12px; background: var(--accent); color: var(--card); border: none; border-radius: 12px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .btn-cancel { padding: 12px 18px; background: var(--surface); color: var(--accent-deep); border: none; border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }

  /* Notes section */
  .notes-section { margin: 12px 16px 0; padding: 16px 18px; }
  .notes-label { font-size: 12px; font-weight: 700; color: var(--text-sec); margin-bottom: 6px; }
  .notes-text { font-size: 13px; line-height: 1.7; }

  /* Remove btn */
  .remove-btn { background: none; border: none; color: var(--text-light); font-size: 16px; cursor: pointer; padding: 0; font-family: inherit; }

  @media (max-width: 480px) { .fab { right: 24px; } }
  @media (min-width: 481px) { .fab { right: calc(50% - 210px); } }

  /* Banner image */
  .banner-img { width: 100%; border-radius: 16px; margin-top: 14px; box-shadow: 0 2px 12px var(--shadow); }
  .empty-img { width: 180px; margin: 0 auto 16px; display: block; border-radius: 16px; }

  /* Phil popup */
  .phil-popup { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(74,64,57,0.4); z-index: 200; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.2s; }
  .phil-card { background: var(--card); border-radius: 20px; padding: 24px; max-width: 320px; width: 90%; text-align: center; box-shadow: 0 8px 40px rgba(74,64,57,0.15); animation: popIn 0.3s; }
  .phil-card img { width: 140px; border-radius: 14px; margin-bottom: 12px; }
  .phil-quote { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.7; margin-bottom: 16px; }
  .phil-dismiss { background: var(--surface); border: none; border-radius: 12px; padding: 10px 28px; font-size: 13px; font-weight: 600; color: var(--accent-deep); cursor: pointer; font-family: inherit; }

  /* Savings milestone */
  .milestone-img { width: 160px; border-radius: 14px; margin-bottom: 12px; }

  /* Ivy toggle */
  .ivy-toggle { display: flex; align-items: center; gap: 10px; padding: 14px 18px; margin: 12px 16px 0; border-radius: 14px; cursor: pointer; transition: all 0.2s; user-select: none; }
  .ivy-toggle.off { background: var(--surface); border: 1.5px solid var(--border); }
  .ivy-toggle.on { background: var(--rose-soft); border: 1.5px solid var(--rose); }
  .ivy-heart { font-size: 20px; transition: transform 0.3s; }
  .ivy-toggle.on .ivy-heart { transform: scale(1.2); }
  .ivy-label { font-size: 13px; font-weight: 600; color: var(--text); }

  /* Ivy panel */
  .ivy-header { text-align: center; padding: 24px 20px 16px; }
  .ivy-header img { width: 100%; border-radius: 16px; margin-bottom: 16px; }
  .ivy-stats { display: flex; gap: 10px; padding: 0 16px; margin-bottom: 12px; }
  .ivy-stat { flex: 1; background: var(--card); border-radius: 14px; padding: 14px; text-align: center; border: 1px solid var(--border); }
  .ivy-stat .num { font-size: 22px; font-weight: 700; color: var(--rose); }
  .ivy-stat .lbl { font-size: 11px; color: var(--text-sec); font-weight: 600; margin-top: 2px; }
  .ivy-fav { margin: 12px 16px; padding: 16px 18px; }
  .ivy-footer { padding: 20px 16px; text-align: center; }
  .ivy-footer img { width: 100%; max-width: 360px; border-radius: 16px; }
  .ivy-footer-text { font-size: 12px; color: var(--text-light); margin-top: 10px; font-weight: 500; }

  /* Ivy streak badge */
  .streak-popup .phil-card { max-width: 340px; }
  .streak-img { width: 200px; border-radius: 14px; margin-bottom: 12px; }

  /* Animations */
  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
  @keyframes popIn { from { transform:scale(0.8);opacity:0 } to { transform:scale(1);opacity:1 } }

  /* Ivy nav button */
  .btn-ivy, [data-action="go-settings"] { background: var(--rose-soft); border: none; border-radius: 10px; padding: 8px 14px; font-size: 12px; font-weight: 600; color: var(--rose); cursor: pointer; font-family: inherit; }

</style>

// ── localStorage 缓存（离线降级用）──
function loadFromLocal() {
  try { state.recipes = JSON.parse(localStorage.getItem("tea-recipes-v3")) || []; } catch { state.recipes = []; }
  try { state.ingredients = JSON.parse(localStorage.getItem("tea-ingredients-v3")) || INITIAL_INGREDIENTS; } catch { state.ingredients = INITIAL_INGREDIENTS; }
  if (!state.ingredients.length) state.ingredients = INITIAL_INGREDIENTS;
}

function load() {
  loadFromLocal();
  render();
}


// ── 导出/导入 ──
function exportData() {
  const data = {
    recipes: state.recipes,
    ingredients: state.ingredients.filter(i => !INITIAL_INGREDIENTS.find(x => x.id === i.id)),
    milestones: state.milestoneSeen,
    exportedAt: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '果茶备份_' + new Date().toLocaleDateString('zh-CN').replace(/\//g, '-') + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.recipes) {
          state.recipes = data.recipes;
          saveRecipes();
        }
        if (data.ingredients) {
          state.ingredients = [...INITIAL_INGREDIENTS, ...data.ingredients];
          saveIngredients();
        }
        if (data.milestones) {
          state.milestoneSeen = data.milestones;
          localStorage.setItem("tea-milestones", JSON.stringify(data.milestones));
        }
        render();
        alert('导入成功！');
      } catch (err) {
        alert('文件格式不对，导入失败');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ── 保存 ──
function saveRecipes() {
  localStorage.setItem("tea-recipes-v3", JSON.stringify(state.recipes));
}











function saveIngredients() {
  localStorage.setItem("tea-ingredients-v3", JSON.stringify(state.ingredients));
}

function calcCost(ing, portion) {
  if (!portion) return 0;
  const ppu = ing.price / ing.totalSize;
  if (portion.fraction !== null && portion.fraction !== undefined) return ppu * ing.totalSize * portion.fraction;
  return ppu * (portion.grams || 0);
}

function getCost(items) {
  return items.reduce((s, item) => {
    const ing = state.ingredients.find(i => i.id === item.ingredientId);
    return ing && item.portion ? s + calcCost(ing, item.portion) : s;
  }, 0);
}

function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

// ── Render ──
function render() {
  const app = document.getElementById("app");
  if (state.view === "recipes") app.innerHTML = renderRecipes();
  else if (state.view === "detail") app.innerHTML = renderDetail();
  else if (state.view === "new") app.innerHTML = renderNew();
  else if (state.view === "ingredients") app.innerHTML = renderIngredients();
  else if (state.view === "ivy") app.innerHTML = renderIvy();
  else if (state.view === "settings") app.innerHTML = renderSettings();
  bindEvents();
}

function renderRecipes() {
  const totalSaved = state.recipes.reduce((s, r) => {
    const count = Math.max(1, r.madeCount || 0);
    return s + Math.max(0, STORE_PRICE - getCost(r.items)) * count;
  }, 0);
  const totalCups = state.recipes.reduce((s, r) => s + (r.madeCount || 0), 0);

  let statsHtml = "";
  if (state.recipes.length > 0) {
    statsHtml = `<div class="stats">
      <div class="stat-card" style="background:var(--sage-soft)">
        <div class="label" style="color:var(--sage)">🌿 累计省下</div>
        <div class="value" style="color:var(--sage-dark)">$${totalSaved.toFixed(2)}</div>
      </div>
      <div class="stat-card" style="background:var(--lavender-soft)">
        <div class="label" style="color:var(--lavender)">🧋 总共做了</div>
        <div class="value" style="color:var(--lavender-dark)">${totalCups} 杯</div>

  }

  let listHtml = "";
  if (state.recipes.length === 0) {
    listHtml = `<div class="empty"><img class="empty-img" src="${IMG.empty}" alt="Phil"><p style="font-size:15px;font-weight:600;color:var(--text-sec)">还没有配方</p><p style="font-size:13px;margin-top:6px">Phil说：人类，快去做杯茶</p></div>`;

    listHtml = `<div style="padding:8px 16px">`;
    state.recipes.forEach((r, idx) => {
      const cost = getCost(r.items);
      const saved = STORE_PRICE - cost;
      let tags = r.items.map(item => {
        const ing = state.ingredients.find(i => i.id === item.ingredientId);
        if (!ing) return "";
        const cc = CAT_COLORS[ing.category] || CAT_COLORS["罐头"];
        const name = ing.name.length > 6 ? ing.name.slice(0,6)+"…" : ing.name;
        return `<span class="tag" style="background:${cc.bg};color:${cc.text}">${ing.emoji} ${esc(name)}</span>`;
      }).join("");
      const madeCount = r.madeCount || 0;
      let badges = "";
      if (r.forIvy) badges += `<span class="badge" style="background:var(--rose-soft);color:var(--rose)">❤️</span>`;
      if (madeCount > 0) badges += `<span class="badge badge-lav">做了${madeCount}杯</span>`;
      if (r.rating > 0) badges += `<span class="star-sm">${"★".repeat(r.rating)}</span>`;
      if (saved > 0) badges += `<span class="badge badge-sage">-$${(saved * Math.max(1, madeCount)).toFixed(2)}</span>`;

      listHtml += `<div class="card recipe-card" data-action="detail" data-idx="${idx}">
        <div class="recipe-top"><span class="recipe-name">${esc(r.name)}</span><span class="recipe-date">${esc(r.createdAt)}</span></div>
        <div class="tags">${tags}</div>
        <div class="recipe-bottom"><span class="cost-big">$${cost.toFixed(2)}</span><div class="badge-row">${badges}</div></div>
      </div>`;
    });
    listHtml += `</div>`;
  }

  
  // Ivy stats
  const ivyRecipes = state.recipes.filter(r => r.forIvy);
  const ivyCups = ivyRecipes.reduce((s,r) => s + (r.madeCount||0), 0);
  const ivyBtn = ivyCups > 0 ? '<button class="btn-ivy" data-action="go-ivy">❤️ Ivy</button>' : '';

  return `<div class="header">
    <div class="header-row">
      <div><h1>我的果茶 ☁️</h1><p class="sub">${state.recipes.length} 个配方</p></div>
      <div style="display:flex;gap:8px">${ivyBtn}<button class="btn-surface" data-action="go-ingredients">📦 原料库</button><button class="btn-surface" data-action="go-settings" style="padding:8px 10px">⚙️</button></div>
    </div>
    ${state.recipes.length > 0 ? '<img class="banner-img" src="'+IMG.header+'" alt="">' : ''}
    ${statsHtml}
  </div>
  ${listHtml}
  ${state.philPopup ? renderPhilPopup() : ''}
  <button class="fab" data-action="go-new">+</button>`;
}

function renderDetail() {
  const r = state.detail;
  if (!r) return "";
  const cost = getCost(r.items);
  const saved = STORE_PRICE - cost;
  const mc = r.madeCount || 0;

  let ingsHtml = r.items.map(item => {
    const ing = state.ingredients.find(i => i.id === item.ingredientId);
    if (!ing) return "";
    const ic = item.portion ? calcCost(ing, item.portion) : 0;
    return `<div class="ing-row">
      <div class="ing-info"><span class="ing-emoji">${ing.emoji}</span><div><div class="ing-name">${esc(ing.name)}</div><div class="ing-portion">${item.portion?.label || "未选量"}</div></div></div>
      <span class="ing-cost">$${ic.toFixed(2)}</span>
    </div>`;
  }).join("");

  let ratingHtml = "";
  if (r.rating > 0) {
    ratingHtml = `<div style="margin:12px 16px 0;display:flex;gap:3px">${[1,2,3,4,5].map(n => `<span class="star ${n<=r.rating?'star-on':'star-off'}">★</span>`).join("")}</div>`;
  }

  let notesHtml = "";
  if (r.notes) {
    notesHtml = `<div class="card notes-section"><div class="notes-label">备注</div><div class="notes-text">${esc(r.notes)}</div></div>`;
  }

  let savedNote = "";
  if (saved > 0 && mc > 0) savedNote = `<div class="counter-card saved-note" style="padding:0;margin:0;border:none;box-shadow:none">这个配方省了 $${(saved*mc).toFixed(2)}</div>`;

  return `<div class="nav-header">
    <button class="back-btn" data-action="go-recipes">←</button>
    <h2>${esc(r.name)}</h2>
  </div>
  <div style="padding:4px 0 0 30px;font-size:12px;color:var(--text-light)">${esc(r.createdAt)}</div>

  <div class="card detail-cost">
    <div><div class="label">每杯成本</div><div class="big" style="color:var(--accent-deep)">$${cost.toFixed(2)}</div></div>
    <div style="text-align:right"><div class="label">vs 外面</div><div class="big" style="color:${saved>0?'var(--sage-dark)':'var(--rose)'}">${saved>0?`-$${saved.toFixed(2)}`:`+$${Math.abs(saved).toFixed(2)}`}</div></div>
  </div>

  <div class="card counter-card">
    <div>
      <div style="font-size:11px;color:var(--text-sec);font-weight:600;letter-spacing:0.5px">已做杯数</div>
      <div class="count">${mc} 杯</div>
      ${savedNote}
    </div>
    <div class="counter-btns">
      <button class="btn-dec" data-action="dec-count">−</button>
      <button class="btn-inc" data-action="inc-count">+1</button>
    </div>
  </div>

  ${ratingHtml}
  <div class="card" style="margin:12px 16px 0;overflow:hidden">${ingsHtml}</div>
  ${notesHtml}
  <div style="padding:16px"><button class="btn-delete" data-action="delete-recipe">删除配方</button></div>
  ${state.philPopup ? renderPhilPopup() : ''}`;
}

function renderNew() {
  const cur = state.current;
  const cost = getCost(cur.items);
  const saved = STORE_PRICE - cost;

  // Selected items
  let selectedHtml = "";
  if (cur.items.length > 0) {
    let itemsHtml = cur.items.map((item, idx) => {
      const ing = state.ingredients.find(i => i.id === item.ingredientId);
      if (!ing) return "";
      const presets = PORTION_PRESETS[ing.portionUnit] || PORTION_PRESETS["罐"];
      let btns = presets.map((p, pi) => `<button class="portion-btn ${item.portion?.label===p.label?'on':'off'}" data-action="set-portion" data-ing="${item.ingredientId}" data-pi="${pi}">${esc(p.label)}</button>`).join("");
      const sep = idx < cur.items.length - 1 ? `border-bottom:1px solid var(--border);padding-bottom:16px;margin-bottom:16px;` : "";
      return `<div style="${sep}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-size:14px;font-weight:600">${ing.emoji} ${esc(ing.name)}</span>
          <button class="remove-btn" data-action="remove-item" data-ing="${item.ingredientId}">×</button>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">${btns}</div>
      </div>`;
    }).join("");

    let costPreview = `<div style="margin-top:16px;padding-top:16px;border-top:1.5px solid var(--border);display:flex;justify-content:space-between;align-items:center">
      <div><div style="font-size:11px;color:var(--text-light);font-weight:600">预估成本</div><div style="font-size:22px;font-weight:700;color:var(--accent-deep)">$${cost.toFixed(2)}</div></div>
      ${saved > 0 ? `<span class="badge badge-sage" style="padding:5px 14px;font-size:12px;border-radius:10px">省 $${saved.toFixed(2)}</span>` : ""}
    </div>`;

    selectedHtml = `<div class="card" style="margin:12px 16px 0;padding:16px">${itemsHtml}${costPreview}</div>`;
  }

  // Ingredient picker
  const grouped = {};
  state.ingredients.forEach(ing => { if (!grouped[ing.category]) grouped[ing.category] = []; grouped[ing.category].push(ing); });
  let pickerHtml = "";
  for (const [cat, ings] of Object.entries(grouped)) {
    const cc = CAT_COLORS[cat] || CAT_COLORS["罐头"];
    let chips = ings.map(ing => {
      const sel = cur.items.find(i => i.ingredientId === ing.id);
      return `<button class="ing-chip ${sel?'sel':''}" data-action="add-item" data-id="${ing.id}" ${sel?'disabled':''}>${ing.emoji} ${esc(ing.name)}</button>`;
    }).join("");
    pickerHtml += `<div class="cat-label" style="color:${cc.text}">${esc(cat)}</div><div style="padding:0 16px;display:flex;flex-wrap:wrap;gap:8px">${chips}</div>`;
  }

  // Rating
  let ratingHtml = `<div style="padding:20px 20px 8px"><div style="font-size:11px;font-weight:700;color:var(--text-sec);letter-spacing:0.5px;margin-bottom:8px">好喝程度</div><div style="display:flex;gap:6px">${[1,2,3,4,5].map(n=>`<span class="star ${n<=cur.rating?'star-on':'star-off'}" style="font-size:26px;cursor:pointer" data-action="set-rating" data-n="${n}">★</span>`).join("")}</div></div>`;

  const disabled = !cur.name.trim() || cur.items.length === 0;

  return `<div class="nav-header">
    <button class="back-btn" data-action="go-recipes">←</button>
    <h2>记录新配方</h2>
  </div>
  <div style="padding:16px 16px 0">
    <input class="input" id="recipe-name" placeholder="给这杯起个名字…" value="${esc(cur.name)}">
  </div>
  <div class="ivy-toggle ${cur.forIvy?'on':'off'}" data-action="toggle-ivy">
    <span class="ivy-heart">${cur.forIvy?'❤️':'🤍'}</span>
    <span class="ivy-label">${cur.forIvy?'给Ivy做的 ☁️':'给Ivy做的？'}</span>
  </div>
  ${selectedHtml}
  ${pickerHtml}
  ${ratingHtml}
  <div style="padding:8px 16px">
    <textarea class="input" id="recipe-notes" placeholder="备注：口感、改进想法…">${esc(cur.notes)}</textarea>
  </div>
  <div style="padding:12px 16px 36px">
    <button class="btn-primary" data-action="save-recipe" ${disabled?'disabled':''}>保存配方</button>
  </div>`;
}

function renderIngredients() {
  const grouped = {};
  state.ingredients.forEach(ing => { if (!grouped[ing.category]) grouped[ing.category] = []; grouped[ing.category].push(ing); });

  let listHtml = "";
  for (const [cat, ings] of Object.entries(grouped)) {
    const cc = CAT_COLORS[cat] || CAT_COLORS["罐头"];
    listHtml += `<div class="cat-label" style="color:${cc.text}">${esc(cat)}</div>`;
    ings.forEach(ing => {
      const isCustom = !INITIAL_INGREDIENTS.find(i => i.id === ing.id);
      listHtml += `<div class="card lib-item"><div class="lib-info"><span style="font-size:18px">${ing.emoji}</span><div><div class="lib-name">${esc(ing.name)}</div><div class="lib-detail">${ing.totalSize}${ing.unit} · $${ing.price.toFixed(2)}</div></div></div>${isCustom?`<button class="btn-delete-sm" data-action="delete-ing" data-id="${ing.id}">删除</button>`:""}</div>`;
    });
  }

  let formHtml = "";
  if (state.showAddIng) {
    const ni = state.newIng;
    formHtml = `<div class="card add-form">
      <div class="title">添加新原料</div>
      <div class="form-row"><input class="input input-sm" id="ni-emoji" style="width:50px;text-align:center;font-size:18px" value="${esc(ni.emoji)}"><input class="input input-sm" id="ni-name" placeholder="名称" value="${esc(ni.name)}" style="flex:1"></div>
      <div class="form-row">
        <select class="input" id="ni-cat" style="flex:1">${["罐头","果泥","茶底","调味","果汁","冷冻水果"].map(c=>`<option ${ni.category===c?'selected':''}>${c}</option>`).join("")}</select>
        <select class="input" id="ni-pu" style="flex:1">${[["罐","按罐"],["勺","按勺"],["撮","按撮"],["个","按个"],["ml","按毫升"]].map(([v,l])=>`<option value="${v}" ${ni.portionUnit===v?'selected':''}>${l}</option>`).join("")}</select>
      </div>
      <div class="form-row">
        <input class="input input-sm" id="ni-size" type="number" placeholder="总量" value="${esc(ni.totalSize)}" style="flex:1">
        <select class="input" id="ni-unit" style="width:60px">${["g","ml","个"].map(u=>`<option ${ni.unit===u?'selected':''}>${u}</option>`).join("")}</select>
        <input class="input input-sm" id="ni-price" type="number" step="0.01" placeholder="AUD" value="${esc(ni.price)}" style="flex:1">
      </div>
      <div class="form-row"><button class="btn-add-confirm" data-action="confirm-add-ing">添加</button><button class="btn-cancel" data-action="cancel-add-ing">取消</button></div>
    </div>`;
  } else {
    formHtml = `<div style="padding:12px 16px"><button class="btn-dashed" data-action="show-add-ing">+ 添加新原料</button></div>`;
  }

  return `<div class="nav-header">
    <button class="back-btn" data-action="go-recipes">←</button>
    <h2>原料库 📦</h2>
  </div>
  ${listHtml}${formHtml}`;
}



// ── Settings ──
function renderSettings() {
  const recipeCount = state.recipes.length;
  const totalCups = state.recipes.reduce((s,r) => s + (r.madeCount||0), 0);
  const customIngs = state.ingredients.filter(i => !INITIAL_INGREDIENTS.find(x => x.id === i.id)).length;
  
  return `<div class="nav-header">
    <button class="back-btn" data-action="go-recipes">←</button>
    <h2>设置</h2>
  </div>
  <div style="padding:20px 16px">
    <div class="card" style="padding:18px;margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;color:var(--text-sec);margin-bottom:12px">📊 数据概览</div>
      <div style="font-size:14px;line-height:2;color:var(--text)">
        配方：${recipeCount} 个<br>
        累计：${totalCups} 杯<br>
        自定义原料：${customIngs} 个
      </div>
    </div>
    <div class="card" style="padding:18px;margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;color:var(--text-sec);margin-bottom:12px">💾 数据备份</div>
      <div style="display:flex;gap:10px">
        <button class="btn-surface" data-action="export-data" style="flex:1;padding:12px;font-size:13px;font-weight:600">📤 导出备份</button>
        <button class="btn-surface" data-action="import-data" style="flex:1;padding:12px;font-size:13px;font-weight:600">📥 导入备份</button>
      </div>
      <div style="font-size:11px;color:var(--text-light);margin-top:10px;line-height:1.6">
        导出会生成一个 JSON 文件，包含所有配方和自定义原料。<br>换设备时导入即可恢复数据。
      </div>
    </div>
  </div>`;
}

// ── Phil Popup ──
function renderPhilPopup() {
  const isMilestone = state.milestonePopup;
  return `<div class="phil-popup ${isMilestone?'':''}">
    <div class="phil-card">
      <img src="${isMilestone ? IMG.savings : IMG.empty}" alt="Phil">
      <div class="phil-quote">${state.philPopup}</div>
      <button class="phil-dismiss" data-action="dismiss-phil">${isMilestone ? '收到！' : '知道了 🐱'}</button>
    </div>
  </div>`;
}

// ── Ivy Panel ──
function renderIvy() {
  const ivyRecipes = state.recipes.filter(r => r.forIvy);
  const totalCups = ivyRecipes.reduce((s,r) => s + (r.madeCount||0), 0);
  
  // Find her favorite (highest rating among ivy recipes)
  let fav = null;
  let maxRating = 0;
  ivyRecipes.forEach(r => {
    if (r.rating > maxRating) { maxRating = r.rating; fav = r; }
  });

  // Calculate consecutive days making tea for Ivy
  // (simplified: count unique dates of ivy recipes)
  const ivyDates = ivyRecipes.map(r => r.createdAt).filter(Boolean);
  const uniqueDates = [...new Set(ivyDates)].sort().reverse();
  
  let favHtml = '';
  if (fav) {
    favHtml = `<div class="card ivy-fav">
      <div style="font-size:11px;font-weight:700;color:var(--text-sec);letter-spacing:0.5px;margin-bottom:8px">她最喜欢的</div>
      <div style="font-size:16px;font-weight:700">${esc(fav.name)}</div>
      <div style="margin-top:4px">${fav.rating > 0 ? '<span class="star-sm">'+'★'.repeat(fav.rating)+'</span>' : ''}</div>
    </div>`;
  }

  let recipeListHtml = '';
  if (ivyRecipes.length > 0) {
    recipeListHtml = '<div style="padding:8px 16px">';
    ivyRecipes.forEach(r => {
      const mc = r.madeCount || 0;
      recipeListHtml += `<div class="card" style="padding:12px 16px;margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:14px;font-weight:600">❤️ ${esc(r.name)}</span>
          <span style="font-size:12px;color:var(--text-light)">${mc > 0 ? mc+'杯' : ''}</span>
        </div>
        ${r.rating > 0 ? '<div style="margin-top:4px"><span class="star-sm">'+'★'.repeat(r.rating)+'</span></div>' : ''}
      </div>`;
    });
    recipeListHtml += '</div>';
  }

  return `<div class="nav-header">
    <button class="back-btn" data-action="go-recipes">←</button>
    <h2>给 Ivy 的茶 ❤️</h2>
  </div>
  <div class="ivy-header">
    <img src="${IMG.ivy_give}" alt="" style="border-radius:16px;width:100%">
  </div>
  <div class="ivy-stats">
    <div class="ivy-stat">
      <div class="num">${totalCups}</div>
      <div class="lbl">给她做了</div>
    </div>
    <div class="ivy-stat">
      <div class="num">${ivyRecipes.length}</div>
      <div class="lbl">专属配方</div>
    </div>
  </div>
  ${favHtml}
  ${recipeListHtml}
  <div class="ivy-footer">
    <img src="${IMG.ivy_cozy}" alt="">
    <div class="ivy-footer-text">每一杯都是想和你窝在一起的借口</div>
  </div>`;
}

// ── Events ──
function bindEvents() {
  document.querySelectorAll("[data-action]").forEach(el => {
    el.onclick = (e) => {
      const action = el.dataset.action;
      switch (action) {
        case "go-recipes": state.view = "recipes"; render(); break;
        case "go-ingredients": state.view = "ingredients"; render(); break;
        case "go-new": state.current = { name:"", items:[], rating:0, notes:"", forIvy:false }; state.view = "new"; render(); break;
        case "detail": {
          const idx = parseInt(el.dataset.idx);
          state.detail = state.recipes[idx];
          state.view = "detail";
          render();
          break;
        }
        case "inc-count": {
          const r = state.detail;
          const idx = state.recipes.findIndex(x => x.id === r.id);
          if (idx >= 0) {
            const incAmount = state.recipes[idx].forIvy ? 2 : 1;
            state.recipes[idx].madeCount = (state.recipes[idx].madeCount||0)+incAmount;
            state.detail = state.recipes[idx];
            saveRecipes();
           
            // ~65% chance Phil comments
            if (Math.random() < 0.65) {
              state.philPopup = PHIL_QUOTES[Math.floor(Math.random()*PHIL_QUOTES.length)];
            }
            // Check savings milestones
            const totalSavedNow = state.recipes.reduce((s,rx) => {
              const cnt = Math.max(1, rx.madeCount||0);
              return s + Math.max(0, STORE_PRICE - getCost(rx.items)) * cnt;
            }, 0);
            for (const m of SAVINGS_MILESTONES) {
              if (totalSavedNow >= m.threshold && !state.milestoneSeen.includes(m.threshold)) {
                state.milestoneSeen.push(m.threshold);
                localStorage.setItem("tea-milestones", JSON.stringify(state.milestoneSeen));
                state.philPopup = m.text;
                state.milestonePopup = true;
              }
            }
            render();
          }
          break;
        }
        case "dec-count": {
          const r2 = state.detail;
          const idx2 = state.recipes.findIndex(x => x.id === r2.id);
          if (idx2 >= 0) { state.recipes[idx2].madeCount = Math.max(0,(state.recipes[idx2].madeCount||0)-1); state.detail = state.recipes[idx2]; saveRecipes(); render(); }
          break;
        }
        case "delete-recipe": {
          const delId = state.detail.id;
          state.recipes = state.recipes.filter(x => x.id !== delId);
          saveRecipes(); state.detail = null; state.view = "recipes"; render();
          break;
        }
        case "add-item": {
          const id = el.dataset.id;
          if (!state.current.items.find(i => i.ingredientId === id)) {
            state.current.items.push({ ingredientId: id, portion: null });
            render();
          }
          break;
        }
        case "remove-item": {
          state.current.items = state.current.items.filter(i => i.ingredientId !== el.dataset.ing);
          render();
          break;
        }
        case "set-portion": {
          const ingId = el.dataset.ing;
          const pi = parseInt(el.dataset.pi);
          const ing = state.ingredients.find(i => i.id === ingId);
          if (ing) {
            const presets = PORTION_PRESETS[ing.portionUnit] || PORTION_PRESETS["罐"];
            const item = state.current.items.find(i => i.ingredientId === ingId);
            if (item) item.portion = presets[pi];
            render();
          }
          break;
        }
        case "set-rating": {
          state.current.rating = parseInt(el.dataset.n);
          render();
          break;
        }
        case "save-recipe": {
          if (!state.current.name.trim() || state.current.items.length === 0) return;
          const recipe = { ...state.current, id: Date.now().toString(), createdAt: new Date().toLocaleDateString("zh-CN"), madeCount: 0, forIvy: state.current.forIvy||false };
          state.recipes.unshift(recipe);
          saveRecipes();
          state.current = { name:"", items:[], rating:0, notes:"", forIvy:false };
          state.view = "recipes";
          render();
          break;
        }
        case "show-add-ing": state.showAddIng = true; render(); break;
        case "cancel-add-ing": state.showAddIng = false; render(); break;
        case "confirm-add-ing": {
          const ni = state.newIng;
          if (!ni.name || !ni.totalSize || !ni.price) return;
          const newIngObj = { ...ni, id: Date.now().toString(), totalSize: parseFloat(ni.totalSize), price: parseFloat(ni.price) };
          state.ingredients.push(newIngObj);
          saveIngredients();
          state.newIng = { name:"", emoji:"🫧", category:"罐头", totalSize:"", unit:"g", price:"", portionUnit:"罐" };
          state.showAddIng = false;
          render();
          break;
        }
        case "toggle-ivy": {
          state.current.forIvy = !state.current.forIvy;
          render();
          break;
        }
        case "go-settings": {
          state.view = "settings";
          render();
          break;
        }
        case "export-data": {
          exportData();
          break;
        }
        case "import-data": {
          importData();
          break;
        }
        case "go-ivy": {
          state.view = "ivy";
          render();
          break;
        }
        case "dismiss-phil": {
          state.philPopup = null;
          state.milestonePopup = false;
          render();
          break;
        }
        case "delete-ing": {
          const delIngId = el.dataset.id;
          state.ingredients = state.ingredients.filter(i => i.id !== delIngId);
          saveIngredients();
          render();
          break;
        }
      }
    };
  });

  // Input bindings for "new" view
  const nameInput = document.getElementById("recipe-name");
  if (nameInput) nameInput.oninput = () => { state.current.name = nameInput.value; };
  const notesInput = document.getElementById("recipe-notes");
  if (notesInput) notesInput.oninput = () => { state.current.notes = notesInput.value; };

  // Input bindings for add ingredient form
  const fields = { "ni-emoji":"emoji", "ni-name":"name", "ni-cat":"category", "ni-pu":"portionUnit", "ni-size":"totalSize", "ni-unit":"unit", "ni-price":"price" };
  for (const [elId, key] of Object.entries(fields)) {
    const el2 = document.getElementById(elId);
    if (el2) el2.oninput = el2.onchange = () => { state.newIng[key] = el2.value; };
  }
}

// ── Init ──
load();
render();
</script>

if ('serviceWorker' in navigator) {
